name: Bot In Corso Pdf

on:
  schedule:
    - cron: '0 18 * * *' # Corrisponde alle 18:00 UTC (20:00 in Italia durante l'ora legale)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # AGGIUNTO pdfplumber qui
          pip install playwright pdfplumber
          playwright install chromium
          playwright install-deps chromium 
      - name: Esegui Bot
        run: python bot_iscrizionicorsopdf.py
      - name: Commit Risultati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          # Aggiunto controllo per evitare errori se non ci sono cambiamenti
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento dati PDF" && git push)
