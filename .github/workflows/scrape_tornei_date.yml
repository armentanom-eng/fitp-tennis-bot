name: Bot Date Selezionate
on:
  schedule:
    - cron: '10 18 * * *' # Le 20:10 in Italia
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          pip install playwright
          playwright install chromium
      - name: Run
        run: python scraper_tornei_date.py
      - name: Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          git commit -m "Aggiornamento dati oggi-domani" || echo "Nessuna modifica"
          git pull --rebase origin main
          git push
