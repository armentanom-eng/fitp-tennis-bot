name: Bot Iscrizioni Aperte

on:
  schedule:
    - cron: '0 18 * * *' # Le 20:00 in Italia
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      - name: Esegui Bot
        run: python NOME_DEL_TUO_FILE.py # Metti qui il nome del file .py
      - name: Commit Risultati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          git commit -m "Aggiornamento iscritti" || echo "Nessuna modifica"
          git push
