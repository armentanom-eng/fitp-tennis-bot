name: Bot Tornei FITP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Ogni giorno alle 08:00

permissions:
  contents: write # ESSENZIALE per il commit

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
        
      - name: Install
        run: |
          pip install playwright pdfplumber
          playwright install chromium
          
      - name: Esegui Bot
        run: python bot.py
        
      - name: Commit Risultati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.txt
          # Commit solo se ci sono modifiche
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento automatico risultati" && git push)
