name: Bot Tornei FITP

on:
  workflow_dispatch:
  schedule:
    - cron: '5 18 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pdfplumber
          playwright install chromium
          
      # - name: Esegui Bot Partite (PDF)
      #   continue-on-error: true
      #   run: python bot.py
      #   
      # - name: Esegui Bot Iscrizioni
      #   continue-on-error: true
      #   run: python bot_iscrizioni.py
        
      - name: Esegui Bot In Programma
        continue-on-error: true
        run: python In_Programma.py
        
      - name: Commit Risultati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento automatico JSON" && git push)
