name: Bot Tennis Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Esegue alle 08:00 ogni giorno

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install playwright pdfplumber requests
          playwright install chromium
          
      - name: Run bot
        run: python bot.py
        
      - name: Commit files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiornamento automatico orari partite"
          file_pattern: '*.txt'
