name: Bot Tennis Update

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright pdfplumber
          playwright install chromium

      - name: Run bot
        env:
          PYTHONUNBUFFERED: "1"
        run: python bot.py
