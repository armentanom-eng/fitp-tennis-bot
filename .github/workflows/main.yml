name: Bot Tornei FITP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
        
      - name: Install dependencies
        run: |
          pip install playwright pdfplumber
          playwright install chromium
          
      - name: Esegui Bot
        run: python bot.py
        
      - name: Commit Risultati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Rimuove i vecchi file txt se presenti
          git rm -f *.txt || true
          # Aggiunge i nuovi file json
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento automatico JSON" && git push)
