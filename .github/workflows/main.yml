name: Esegui Bot FITP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install playwright pdfplumber
          playwright install chromium
          playwright install-deps

      - name: Esecuzione Bot
        env:
          PYTHONUNBUFFERED: "1"
        run: python bot.py

      - name: Upload Risultati
        uses: actions/upload-artifact@v4
        with:
          name: risultati-fitp
          path: |
            Giovanili_Partite.txt
            Open_Partite.txt
