name: Bot Iscritti In Corso

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installazione delle dipendenze necessarie
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
          
      - name: Esegui Bot
        run: python bot_iscritti_in_corso.py
        
      - name: Commit Risultati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Aggiunge solo i file corretti generati dallo script
          git add Iscritti_Giovanili_In_Corso.json Iscritti_Open_In_Corso.json
          
          # Esegue commit e push solo se ci sono modifiche reali
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento iscritti in corso" && git push)
