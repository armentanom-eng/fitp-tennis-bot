name: Bot Estrazione PDF Tornei

on:
  schedule:
    - cron: '15 18 * * *' # Alle 20:15 italiane
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install playwright pdfplumber
          playwright install chromium
          
      - name: Esegui Bot Estrazione
        run: python bot.py
        
      - name: Commit Risultati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          git commit -m "Aggiornamento totale tornei PDF" || echo "Nessuna modifica"
          git pull --rebase origin main
          git push
